# SIN JAPAN 営業自動化ダッシュボード - nginx設定
# 配置先: /etc/nginx/sites-available/sinjapan-sales
# 有効化: ln -sf /etc/nginx/sites-available/sinjapan-sales /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name sinjapan-sales.site www.sinjapan-sales.site;

    # フロントエンド静的ファイル
    root /var/www/sinjapan-sales/artifacts/sales-dashboard/dist/public;
    index index.html;

    # 画像ファイル → Expressサーバー(6050)にプロキシ
    location /images/ {
        proxy_pass http://127.0.0.1:6050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # APIリクエスト → Expressサーバー(6050)にプロキシ
    location /api/ {
        proxy_pass http://127.0.0.1:6050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
        client_max_body_size 10m;
    }

    # SPAフォールバック (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/sinjapan-sales-access.log;
    error_log  /var/log/nginx/sinjapan-sales-error.log;
}
