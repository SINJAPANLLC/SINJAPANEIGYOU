# SIN JAPAN 営業自動化ダッシュボード - nginx設定
# /etc/nginx/sites-available/sinjapan-sales に配置
# ドメイン(sales.sinjapan.jp など)とAPIポート(6050)を実際の値に合わせて変更してください

server {
    listen 80;
    server_name sales.sinjapan.jp;   # ← ドメインを変更

    # フロントエンド静的ファイル
    root /var/www/sinjapan-sales/artifacts/sales-dashboard/dist/public;
    index index.html;

    # APIリクエスト → Expressサーバー(6050)にプロキシ
    location /api/ {
        proxy_pass http://127.0.0.1:6050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
        client_max_body_size 10m;
    }

    # SPAフォールバック (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ログ
    access_log /var/log/nginx/sinjapan-sales-access.log;
    error_log  /var/log/nginx/sinjapan-sales-error.log;
}
